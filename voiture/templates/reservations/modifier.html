{% extends 'base.html' %}

{% block content %}
<div class="card bg-base-100 shadow-xl">
    <div class="card-body">
        <h2 class="card-title text-2xl mb-6">Modification d'une Réservation</h2>

        <form method="POST" action="{% url 'modifier_reservations' reservation.id %}" class="space-y-6">
            {% csrf_token %}

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="form-control">
                    <label class="label">
                        <span class="label-text font-medium">Client *</span>
                    </label>
                    <select name="utilisateur" class="select select-bordered" required>
                        <option value="">Sélectionner un client</option>
                        {% for u in utilisateurs %}
                        <option value="{{ u.id }}" {% if reservation.utilisateur.id == u.id %}selected{% endif %}>
                            {{ u.nom }} {{ u.prenom }}
                        </option>
                    {% endfor %}
                    </select>
                </div>

                <div class="form-control">
                <label class="label">
                    <span class="label-text">Voiture *</span>
                </label>
                <select name="voiture" class="select select-bordered" required>
                    {% for v in voitures %}
                        <option value="{{ v.id }}" {% if reservation.voiture.id == v.id %}selected{% endif %}>
                            {{ v.marque }} {{ v.modele }} - {{ v.immatriculation }} ({{ v.prix }} FCFA/jour)
                        </option>
                    {% endfor %}
                </select>
            </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="form-control">
                    <label class="label">
                        <span class="label-text font-medium">Date de début *</span>
                    </label>
                    <input type="date" name="dateDebut" value="{{ reservation.dateDebut|date:'Y-m-d' }}" class="input input-bordered" required>
                </div>

                <div class="form-control">
                    <label class="label">
                        <span class="label-text font-medium">Date de fin *</span>
                    </label>
                    <input type="date" name="dateFin" value="{{ reservation.dateFin|date:'Y-m-d' }}" class="input input-bordered" required>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="form-control">
                    <label class="label">
                        <span class="label-text font-medium">Montant (FCFA) *</span>
                    </label>
                    <input type="number" step="0.01" name="montant" class="input input-bordered" placeholder="Montant"
                        value="{{ reservation.montant }}" required>
                </div>
                <div class="form-control">
                    <label class="label">
                        <span class="label-text font-medium">Statut de la réservation *</span>
                    </label>
                    <select name="statutR" class="select select-bordered">
                        <option value="en_attente" {% if reservation.statutR == 'en_attente' %}selected{% endif %}>En attente</option>
                        <option value="confirmee" {% if reservation.statutR == 'confirmee' %}selected{% endif %}>Confirmée</option>
                        <option value="en_cours" {% if reservation.statutR == 'en_cours' %}selected{% endif %}>En cours</option>
                        <option value="terminee" {% if reservation.statutR == 'terminee' %}selected{% endif %}>Terminée</option>
                        <option value="annulee" {% if reservation.statutR == 'annulee' %}selected{% endif %}>Annulée</option>
                </select>
                </div>
            </div>

            <div class="card-actions justify-end space-x-4">
                <a href="{% url 'liste_reservations' %}" class="btn btn-error">
                    Annuler
                </a>
                <button type="submit" class="btn btn-primary">
                    Sauvegarder les modifications
                </button>
            </div>
        </form>
    </div>
</div>

{% endblock %}
