{% extends 'base.html' %}


{% block content %}
<div class="card bg-base-100 shadow-xl">
    <div class="card-body">
        <div class="flex items-center justify-between mb-6">
            <h2 class="card-title text-2xl mb-6">Ajout d'une Réservation</h2>
            
            <a href="{% url 'liste_reservations' %}" class="btn btn-error">
                Annuler
            </a>
        </div>

        <form method="POST" action="{% url 'ajouter_reservations' %}" class="space-y-6">
            {% csrf_token %}
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="form-control">
                    <label class="label">
                        <span class="label-text font-medium">Client *</span>
                    </label>
                    <select name="utilisateur" class="select select-bordered" required>
                        <option value="">Sélectionner un client</option>
                        {% for u in utilisateurs %}
                        <option value="{{ u.id }}">
                            {{ u.nom }} {{ u.prenom }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-control">
                    <label class="label">
                        <span class="label-text font-medium">Voiture *</span>
                    </label>
                    <select name="voiture" class="select select-bordered" required>
                        <option value="">Sélectionner une voiture</option>
                        {% for v in voitures %}
                        <option value="{{ v.id }}">
                            {{ v.marque }} {{ v.modele }} - {{ v.immatriculation }} ({{ v.prix }} FCFA/jour)
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="form-control">
                    <label class="label">
                        <span class="label-text font-medium">Date de début *</span>
                    </label>
                    <input type="date" name="dateDebut" class="input input-bordered" required>
                </div>
                <div class="form-control">
                    <label class="label">
                        <span class="label-text font-medium">Date de fin *</span>
                    </label>
                    <input type="date" name="dateFin" class="input input-bordered" required>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="form-control">
                    <label class="label">
                        <span class="label-text font-medium">Montant (FCFA) *</span>
                    </label>
                    <input type="number" step="0.01" name="montant" class="input input-bordered" placeholder="Montant"
                        value="Calculé après soumission" readonly>
                </div>
                <div class="form-control">
                    <label class="label">
                        <span class="label-text font-medium">Statut *</span>
                    </label>
                    <select name="statutR" class="select select-bordered" required>
                        <option value="en_attente">En attente</option>
                        <option value="confirmee">Confirmée</option>
                        <option value="en_cours">En cours</option>
                        <option value="terminee">Terminée</option>
                        <option value="annulee">Annulée</option>
                    </select>
                </div>
            </div>

            <div class="card-actions justify-end space-x-4">
                <button type="reset" class="btn btn-neutral">
                    Réinitialiser
                </button>
                <button type="submit" class="btn btn-primary">
                    Ajouter la réservation
                </button>
            </div>
        </form>
    </div>
</div>

{% endblock %}
