
{% extends 'base.html' %}

    {% block content %}
    <div class="card bg-base-100 shadow-xl p-6 max-w-md mx-auto">
    <div class="card-body">
        <h2 class="text-xl font-bold mb-4">Confirmer la suppression</h2>
        <p class="mb-4">
            Êtes-vous sûr de vouloir supprimer cet avis de 
            <strong>{{ avis.utilisateur.nom }} {{ avis.utilisateur.prenom }}</strong> 
            sur la voiture 
            <strong>{{ avis.voiture.marque }} {{ avis.voiture.modele }}</strong> ?
        </p>

        <form method="POST" class="flex justify-between space-x-4">
            {% csrf_token %}
            <a href="{% url 'liste_avis' %}" class="btn btn-neutral w-1/2 text-center">Annuler</a>
            <button type="submit" class="btn btn-error w-1/2">Confirmer</button>
        </form>
    </div>
</div>

    {% endblock %}
