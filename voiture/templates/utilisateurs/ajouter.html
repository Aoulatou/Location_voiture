{% extends 'base.html' %}


{% block content %}
<div class="card bg-base-100 shadow-xl">
    <div class="card-body">
        <div class="flex items-center justify-between mb-6">
            <h2 class="card-title text-2xl mb-6">Ajout d'un Utilisateur</h2>
            
            <a href="{% url 'liste_utilisateurs' %}" class="btn btn-error">
                Annuler
            </a>
        </div>

        <form method="POST" action="{% url 'ajouter_utilisateurs' %}" class="space-y-6">
            {% csrf_token %}
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="form-control">
                    <label class="label">
                        <span class="label-text font-medium">Nom *</span>
                    </label>
                    <input type="text" name="nom" placeholder="Nom de famille" class="input input-bordered" required>
                </div>

                <div class="form-control">
                    <label class="label">
                        <span class="label-text font-medium">Prénom *</span>
                    </label>
                    <input type="text" name="prenom" placeholder="Prénom" class="input input-bordered" required>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="form-control">
                    <label class="label">
                        <span class="label-text font-medium">Email *</span>
                    </label>
                    <input type="email" name="email" placeholder="example@email.com" class="input input-bordered"
                        required>
                </div>
                <div class="form-control">
                    <label class="label">
                        <span class="label-text font-medium">Téléphone *</span>
                    </label>
                    <input type="tel" name="telephone" placeholder="80 80 80 80" class="input input-bordered" required>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="form-control">
                    <label class="label">
                        <span class="label-text font-medium">Adresse *</span>
                    </label>
                    <textarea name="adresse" class="textarea textarea-bordered h-12" required></textarea>
                </div>

                <div class="form-control">
                    <label class="label">
                        <span class="label-text font-medium">Rôle *</span>
                    </label>
                    <select name="role" class="select select-bordered" required>
                        <option value="">Sélectionner un rôle</option>
                        <option value="client">Client</option>
                        <option value="proprietaire">Propriétaire</option>
                        <option value="veyra">Veyra</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="form-control">
                    <label class="label">
                        <span class="label-text font-medium">Mot de passe *</span>
                    </label>
                    <input type="password" name="password" placeholder="••••••••••••••" class="input input-bordered"
                        required>
                </div>
                <div class="form-control">
                    <label class="label">
                        <span class="label-text font-medium">Confirmer le mot de passe *</span>
                    </label>
                    <input type="password" placeholder="••••••••••••••" class="input input-bordered" required>
                </div>
            </div>

            <div class="card-actions justify-end space-x-4">
                <button type="reset" class="btn btn-neutral">
                    <i class="fas fa-undo"></i> 
                    Réinitialiser
                </button>
                <button type="submit" class="btn btn-primary">
                    Ajouter l'utilisateur
                </button>
            </div>
        </form>
    </div>
</div>

{% endblock %}
