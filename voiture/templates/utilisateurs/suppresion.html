
{% extends 'base.html' %}

    {% block content %}
    <form method="POST" class="space-y-4 flex flex-col">
        <span class="text-center">
            <h3 class="font-bold text-lg text-error mb-4">
            <i class="fas fa-exclamation-triangle mr-2"></i>
            Confirmer la suppression
        </h3>
        <p class="mb-4">
            Êtes-vous sûr de vouloir supprimer cet utilisateur 
            <span id="delete-user-name" class="font-semibold"></span> ?
        </p>
        <p class="text-sm text-gray-600 mb-6">
            Cette action est irréversible et supprimera toutes les données associées.
        </p>
        </span>

        {% csrf_token %}

        <div class="flex justify-center space-x-6">
            <a href="{% url 'liste_utilisateurs' %}" class="btn btn-active btn-accent w-40 text-center">Annuler</a>
            <button type="submit" class="btn btn-error w-40">Confirmer</button>
        </div>


    </form>

    {% endblock %}
