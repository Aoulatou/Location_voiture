<!DOCTYPE html>
<html lang="fr" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Veyra</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <!-- Messages -->
    {% if messages %}
    <div class="fixed top-4 right-4 z-50 space-y-2">
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} shadow-lg max-w-sm">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <div class="flex items-center justify-center min-h-screen p-4">
        <div class="w-full max-w-md">
            <!-- Logo -->
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-car text-2xl text-white"></i>
                </div>
                <h1 class="text-3xl font-bold text-gray-800">Veyra</h1>
                <p class="text-gray-600 mt-1">Connexion à votre compte</p>
            </div>

            <!-- Formulaire -->
            <div class="bg-white rounded-lg shadow-lg p-8">
                <form method="post" action="{% url 'connexion' %}" class="space-y-6">
                    {% csrf_token %}

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Adresse email
                        </label>
                        <input type="email" name="email" class="input input-bordered w-full"
                            placeholder="votre@email.com" required>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Mot de passe
                        </label>
                        <input type="password" name="password" class="input input-bordered w-full"
                            placeholder="••••••••" required>
                    </div>

                    <div class="flex items-center justify-between text-sm">
                        <a href="#" class="text-indigo-600 hover:text-indigo-800">
                            Mot de passe oublié ?
                        </a>
                    </div>

                    <button type="submit" class="btn btn-primary w-full">
                        Se connecter
                    </button>
                </form>

                <div class="mt-6 text-center">
                    <p class="text-gray-600">
                        Pas encore de compte ?
                        <a href="{% url 'inscription' %}" class="text-indigo-600 hover:text-indigo-800 font-medium">
                            S'inscrire
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Auto-fermeture après 5 secondes
        document.addEventListener('DOMContentLoaded', function () {
            const alerts = document.querySelectorAll('.alert');
            alerts.forEach(alert => {
                setTimeout(() => {
                    alert.style.transition = 'opacity 0.5s';
                    alert.style.opacity = '0';
                    setTimeout(() => alert.remove(), 500);
                }, 5000);
            });
        });
    </script>
</body>

</html>
